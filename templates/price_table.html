<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Price Monitor</title>
  <link rel="stylesheet" href="https://unpkg.com/purecss@2.0.6/build/pure-min.css">
  <link rel="stylesheet" href="https://unpkg.com/purecss@2.0.6/build/grids-responsive-min.css">
  <script src="https://unpkg.com/htmx.org"></script>
  <script>
    document.body.addEventListener('htmx:configRequest', function(evt) {
      // Only add auth header when not in debug mode
      if (!window.location.href.includes('localhost')) {
        evt.detail.headers['Authorization'] = 'Basic ' + btoa('admin:secret');
      }
    });
  </script>
</head>
<body class="pure-g" style="padding: 1em; max-width: 1200px; margin: 0 auto;">
  <div class="pure-u-1">
    <form class="pure-form pure-g pure-g" hx-get="/prices" hx-target="tbody" hx-trigger="change, keyup delay:500ms">
      <div class="pure-u-1 pure-u-md-1-3">
        <input class="pure-input-1" type="text" name="article_filter" placeholder="Search articles...">
      </div>
      <div class="pure-u-1 pure-u-md-1-4">
        <input class="pure-input-1" type="date" name="start_date">
      </div>
      <div class="pure-u-1 pure-u-md-1-4">
        <input class="pure-input-1" type="date" name="end_date">
      </div>
    </form>
    
    <table class="pure-table pure-table-bordered pure-table-striped">
      <caption><h2>Prices</h2></caption>
      <thead>
        <tr>
          <th>Date</th>
          <th>Article</th>
          <th>Seller Price</th>
          <th>Old Price</th>
          <th>Marketing Price</th>
          <th>OA Price</th>
        </tr>
      </thead>
      <tbody hx-get="/prices" hx-trigger="load">
        <!-- Prices will be loaded here via HTMX -->
      </tbody>
    </table>
  </div>
</body>
</html>
